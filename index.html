<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Fonts -->
    <link rel="stylesheet" href="./src/assets/fonts/a2z/a2z.css" />
    <link
      rel="stylesheet"
      href="./src/assets/fonts/pretendardvariable/pretendardvariable.css"
    />
    <!-- Styles -->
    <link rel="stylesheet" href="./src/styles/global.css" />
    <link rel="stylesheet" href="./src/styles/album-art.css" />
    <link rel="stylesheet" href="./src/styles/music-info.css" />
    <link rel="stylesheet" href="./src/styles/lyrics.css" />
    <link rel="stylesheet" href="./src/styles/progress-bar.css" />
    <link rel="stylesheet" href="./src/styles/player-control.css" />
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="./src/scripts/album-art.js" defer></script>
    <script src="./src/scripts/lyrics.js" defer></script>
    <script src="./src/scripts/player-control.js" defer></script>
  </head>
  <body>
    <video id="bgVideo" muted playsinline></video>
    <div id="bgOverlay"></div>
    <input type="file" id="bgVideoInput" accept="video/*" />
    <dialog id="lyricsSetting">
      <h1>가사 입력</h1>
      <textarea
        id="lyricsInput"
        placeholder="[1절 - 1] 첫 번째 가사&#10;두 번째 가사&#10;[1절 - 2] 세 번째 가사"
        rows="10"
      ></textarea>
      <form method="dialog">
        <button id="saveLyricsBtn">적용</button>
        <button>닫기</button>
      </form>
    </dialog>
    <main>
      <!-- 아트 + 가사 -->
      <section id="mainBox">
        <!-- 앨범아트 + 곡 정보 -->
        <div id="albumArt-musicInfo" class="shadow">
          <input type="file" id="albumArtInput" accept="image/*" />
          <input
            type="file"
            id="zipInput"
            accept=".zip"
            style="display: none"
          />
          <button id="albumArtButton"></button>
          <div id="musicArtistTextBox">
            <input type="text" id="musicTitle" value="Music Name" />
            <input type="text" id="artistName" value="Artist Name" />
          </div>
        </div>
        <div id="lyricsBox" class="shadow">
          <p class="lyric-line post-focus"></p>
          <p class="lyric-line post-focus"></p>
          <p class="lyric-line focus"></p>
          <p class="lyric-line pre-focus">가사1</p>
          <p class="lyric-line pre-focus">가사2</p>
          <p class="lyric-line pre">가사3</p>
          <p class="lyric-line pre">가사4</p>
          <p class="lyric-line pre">가사5</p>
          <p class="lyric-line pre">가사6</p>
          <p class="lyric-line pre">가사7</p>
          <p class="lyric-line pre">가사8</p>
          <p class="lyric-line pre">가사9</p>
        </div>
      </section>
      <!-- 음악 제어 파트 -->
      <div id="musicControl">
        <!-- 셔플/이전/재생/다음/반복 -->
        <div id="playerControl" class="shadow">
          <button class="btn-small">
            <img src="src/assets/icons/shuffle.svg" alt="shuffle" />
          </button>
          <div id="main">
            <button class="btn-medium">
              <img src="src/assets/icons/previous.svg" alt="previous" />
            </button>
            <button class="btn-large">
              <img src="src/assets/icons/play.svg" alt="play" id="play-pause" />
            </button>
            <button class="btn-medium">
              <img src="src/assets/icons/next.svg" alt="next" />
            </button>
          </div>
          <button class="btn-small">
            <img src="src/assets/icons/repeat.svg" alt="repeat" />
          </button>
        </div>
        <!-- 진행률 -->
        <div id="progressBar" class="shadow">
          <input type="text" id="currentTime" value="00:00" readonly />
          <div id="body">
            <span id="fill">
              <span id="thumb">
                <!-- 파트 표시 요소 -->
                <span id="partIndicator-triangle">
                  <span id="partIndicator">1절 - 1</span>
                </span>
              </span>
            </span>
          </div>
          <input type="text" id="endTime" value="00:00" readonly />
        </div>
      </div>
    </main>
  </body>
</html>
